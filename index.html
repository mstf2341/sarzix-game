<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSTF Ultra | الرابط المباشر</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --p: #38bdf8; --bg: #0b1120; --card: #1e293b; --accent: #fbbf24; --green: #10b981; --red: #ef4444; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: white; text-align: center; margin: 0; padding-bottom: 50px; }
        .hidden { display: none !important; }
        .box { background: var(--card); padding: 20px; border-radius: 20px; margin: 15px auto; max-width: 650px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        .btn { cursor: pointer; border-radius: 12px; border: none; font-weight: bold; transition: 0.2s; padding: 15px; color: white; }
        input, textarea { background: #0f172a; color: white; border: 1px solid var(--p); padding: 12px; border-radius: 10px; margin: 5px; font-size: 1rem; width: 90%; }
        .btn-hint { background: #2d3748; width: 100%; margin: 8px 0; text-align: right; border: 1px solid var(--p); font-size: 1.1rem; }
        
        /* شاشة العرض */
        #displayHint { font-size: 2.2rem; color: var(--p); min-height: 450px; padding: 30px; font-weight: bold; text-align: right; display: flex; flex-direction: column; gap: 15px; }
        .hint-entry { animation: slideIn 0.4s ease-out; padding: 15px; background: rgba(255,255,255,0.03); border-right: 5px solid var(--p); border-radius: 5px; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(30px); } to { opacity: 1; transform: translateX(0); } }
        
        .score-bar { display:flex; justify-content: space-around; background: #000; padding: 20px; border-bottom: 6px solid var(--p); font-size: 2.5rem; font-weight: 900; }
        .copy-link { background: var(--green); color: black; padding: 10px; border-radius: 10px; cursor: pointer; display: inline-block; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="setupView" style="padding: 50px 10px;">
        <h1 style="color:var(--p); font-size: 5rem; margin: 0;">MSTF</h1>
        <div class="box">
            <button class="btn" style="background:var(--p); width:100%; font-size: 1.5rem;" onclick="startAsDisplay()">ابدأ كـ "شاشة عرض" 📺</button>
            <p style="margin-top: 20px; opacity: 0.6;">أو إذا وصلك رابط دعوة، افتحه مباشرة.</p>
        </div>
    </div>

    <div id="displayView" class="hidden">
        <div class="score-bar">
            <div><span id="dsName1">فريق 1</span>: <span id="ds1" style="color:var(--accent)">0</span></div>
            <div style="color: var(--p); font-size: 1.2rem; align-self: center;">MSTF</div>
            <div><span id="dsName2">فريق 2</span>: <span id="ds2" style="color:var(--accent)">0</span></div>
        </div>
        <div id="inviteArea" class="box">
            <p>أرسل هذا الرابط لصديقك للتحكم:</p>
            <div class="copy-link" onclick="copyInviteLink()">نسخ رابط الدعوة 🔗</div>
        </div>
        <div id="displayHint">بانتظار المقدم...</div>
    </div>

    <div id="adminView" class="hidden">
        <h2 style="color: var(--p);">لوحة تحكم MSTF 📱</h2>
        
        <div class="box">
            <p style="font-size: 0.8rem; color: var(--accent);">تعديل أسماء الفرق:</p>
            <input type="text" id="team1Input" placeholder="اسم الفريق الأول" oninput="updateNames()" style="width:40%;">
            <input type="text" id="team2Input" placeholder="اسم الفريق الثاني" oninput="updateNames()" style="width:40%;">
        </div>

        <div class="box">
            <h3 style="color: var(--accent);">⚡ الرفع الجماعي</h3>
            <textarea id="bulkInput" rows="3" placeholder="الإجابة،ت1،ت2،ت3،ت4،ت5"></textarea>
            <button class="btn" style="background:var(--accent); color: black; width:100%;" onclick="importBulk()">استيراد الأسئلة 🚀</button>
        </div>

        <div class="box">
            <button class="btn" style="background:var(--p); width:100%;" onclick="nextQuestion()">سحب سؤال عشوائي 🎲</button>
            <p id="qCount" style="font-size: 0.8rem; opacity: 0.5; margin-top:5px;">الأسئلة: 0</p>
        </div>

        <div id="hintsControl" class="box hidden">
            <h2 id="ansDisplay" style="color:var(--accent)">؟؟؟</h2>
            <div id="hintButtonsArea"></div>
        </div>

        <div class="box">
            <p>إضافة نقاط مخصصة:</p>
            <input type="number" id="pointsAmount" value="50" style="width: 100px; text-align: center; font-size: 1.5rem;">
            <div style="display: flex; gap: 10px; margin-top: 10px;">
                <button class="btn" style="background:var(--green); flex: 1;" onclick="addScore(1)">+ للفريق 1</button>
                <button class="btn" style="background:var(--green); flex: 1;" onclick="addScore(2)">+ للفريق 2</button>
            </div>
            <button class="btn" style="background:var(--red); width: 100%; margin-top: 15px;" onclick="resetScores()">تصفير النتيجة 🔄</button>
        </div>
    </div>

    <script>
        let myQuestions = JSON.parse(localStorage.getItem('mstf_v5')) || [];
        let peer, conn, s1 = 0, s2 = 0, currentQ;
        let t1Name = "فريق 1", t2Name = "فريق 2";

        // التحقق من وجود ID في الرابط (دعوة مباشرة)
        const urlParams = new URLSearchParams(window.location.search);
        const inviteId = urlParams.get('join');

        if (inviteId) {
            startAsAdmin(inviteId);
        }

        function startAsDisplay() {
            const displayId = Math.floor(1000 + Math.random() * 9000).toString();
            peer = new Peer(displayId);
            document.getElementById('setupView').classList.add('hidden');
            document.getElementById('displayView').classList.remove('hidden');
            
            peer.on('open', id => {
                window.currentRoomId = id;
            });

            peer.on('connection', c => {
                conn = c;
                document.getElementById('inviteArea').classList.add('hidden');
                conn.on('data', d => {
                    const ha = document.getElementById('displayHint');
                    if (d.type === 'hint') {
                        if (ha.innerText.includes("بانتظار") || ha.innerText.includes("سحب")) ha.innerHTML = "";
                        ha.innerHTML += `<div class="hint-entry">${d.msg}</div>`;
                    }
                    if (d.type === 'clear') ha.innerHTML = `<div style="color:gray;">جاري سحب سؤال...</div>`;
                    if (d.type === 'score') { 
                        document.getElementById('ds1').innerText = d.s1; 
                        document.getElementById('ds2').innerText = d.s2; 
                    }
                    if (d.type === 'names') {
                        document.getElementById('dsName1').innerText = d.n1;
                        document.getElementById('dsName2').innerText = d.n2;
                    }
                });
            });
        }

        function startAsAdmin(id) {
            peer = new Peer();
            peer.on('open', () => {
                conn = peer.connect(id);
                conn.on('open', () => {
                    document.getElementById('setupView').classList.add('hidden');
                    document.getElementById('adminView').classList.remove('hidden');
                    updateQCount();
                });
            });
        }

        function copyInviteLink() {
            const link = window.location.origin + window.location.pathname + "?join=" + window.currentRoomId;
            navigator.clipboard.writeText(link);
            alert("تم نسخ رابط الدعوة! أرسله لصديقك الآن.");
        }

        function updateNames() {
            t1Name = document.getElementById('team1Input').value || "فريق 1";
            t2Name = document.getElementById('team2Input').value || "فريق 2";
            conn.send({ type: 'names', n1: t1Name, n2: t2Name });
        }

        function importBulk() {
            const text = document.getElementById('bulkInput').value;
            const lines = text.split('\n');
            lines.forEach(line => {
                const parts = line.split(/[،,]/);
                if(parts.length >= 6) {
                    myQuestions.push({ name: parts[0].trim(), hints: parts.slice(1,6).map(h => h.trim()) });
                }
            });
            localStorage.setItem('mstf_v5', JSON.stringify(myQuestions));
            alert("تمت الإضافة!");
            document.getElementById('bulkInput').value = "";
            updateQCount();
        }

        function updateQCount() { document.getElementById('qCount').innerText = "الأسئلة: " + myQuestions.length; }
        
        function nextQuestion() {
            if(myQuestions.length === 0) return alert("البنك فارغ!");
            currentQ = myQuestions[Math.floor(Math.random() * myQuestions.length)];
            document.getElementById('ansDisplay').innerText = "الإجابة: " + currentQ.name;
            document.getElementById('hintsControl').classList.remove('hidden');
            let h = "";
            currentQ.hints.forEach((hint, i) => {
                h += `<button class="btn btn-hint" onclick="conn.send({type:'hint', msg:'${hint}'})">إرسال تلميح ${i+1}</button>`;
            });
            document.getElementById('hintButtonsArea').innerHTML = h;
            conn.send({ type: 'clear' });
        }

        function addScore(t) { 
            const p = parseInt(document.getElementById('pointsAmount').value) || 0;
            t === 1 ? s1 += p : s2 += p; 
            conn.send({ type: 'score', s1, s2 }); 
        }

        function resetScores() { s1 = 0; s2 = 0; conn.send({ type: 'score', s1, s2 }); }
    </script>
</body>
</html>
