<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحدي SARZIX | نسخة الصور السريعة</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --p: #38bdf8; --bg: #0f172a; --card: #1e293b; --accent: #fbbf24; --green: #10b981; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: white; text-align: center; margin: 0; overflow-x: hidden; }
        .hidden { display: none !important; }
        button { cursor: pointer; border-radius: 12px; border: none; font-weight: bold; transition: 0.2s; }
        .header { display: flex; justify-content: space-around; align-items: center; background: var(--card); padding: 15px; font-size: 1.8rem; border-bottom: 5px solid var(--p); }
        #timerBox { font-size: 3rem; background: #000; padding: 5px 25px; border-radius: 15px; color: var(--accent); border: 2px solid var(--p); }
        #pixelImg { width: 450px; height: 450px; border-radius: 25px; margin-top: 20px; filter: blur(80px); object-fit: cover; border: 6px solid var(--card); transition: filter 0.4s linear; background: #222; }
        #myIdDisplay { font-size: 2.5rem; color: var(--accent); margin: 10px 0; font-weight: bold; }
        .box { background: var(--card); padding: 20px; border-radius: 20px; margin: 15px auto; max-width: 450px; border: 1px solid rgba(255,255,255,0.1); }
        input, select { width: 90%; padding: 15px; margin: 10px 0; border-radius: 10px; background: #0f172a; color: white; border: 1px solid var(--p); font-size: 1.1rem; }
        .btn-main { background: var(--p); color: white; width: 100%; padding: 18px; font-size: 1.4rem; margin-top: 10px; }
        .btn-action { background: var(--green); color: white; width: 48%; padding: 15px; font-size: 1.1rem; }
    </style>
</head>
<body>

    <div id="setupView" style="padding: 50px 10px;">
        <h1 style="color: var(--p); font-size: 4rem; margin:0;">SARZIX</h1>
        <div class="box">
            <p style="opacity: 0.6;">رمز غرفتك (أعطه للطرف الآخر):</p>
            <div id="myIdDisplay">جاري الاتصال...</div>
            <hr style="opacity:0.1">
            <input type="text" id="joinIdInput" placeholder="أدخل الرمز (4 أرقام)">
            <button class="btn-main" onclick="startAsAdmin()">دخول كمقدم 📱</button>
            <button class="btn-main" style="background:#444" onclick="startAsDisplay()">بدء كشاشة عرض 📺</button>
        </div>
    </div>

    <div id="displayView" class="hidden">
        <div class="header">
            <div>فريق 1: <span id="ds1" style="color:var(--accent)">0</span></div>
            <div id="timerBox">60</div>
            <div>فريق 2: <span id="ds2" style="color:var(--accent)">0</span></div>
        </div>
        <img id="pixelImg" src="" onerror="this.src='https://via.placeholder.com/500?text=Image+Loading...'">
    </div>

    <div id="adminView" class="hidden">
        <div class="box">
            <select id="catSelect">
                <option value="youtubers">👤 يوتيوبرز</option>
                <option value="players">⚽ لاعبين</option>
                <option value="clubs">🛡️ أندية</option>
                <option value="brands">🏢 ماركات</option>
                <option value="food">🍕 أكلات</option>
            </select>
            <button class="btn-main" style="background:#8b5cf6" onclick="sendNextRound()">جولة جديدة 🚀</button>
        </div>
        <div class="box">
            <h3 id="ansDisplay" style="color:var(--accent)">الإجابة تظهر هنا</h3>
            <div style="display:flex; gap:10px; justify-content:center;">
                <button class="btn-action" onclick="sendScore(1)">+ فريق 1</button>
                <button class="btn-action" onclick="sendScore(2)">+ فريق 2</button>
            </div>
        </div>
    </div>

            brands: ["أبل", "سامسونج", "هواوي", "سوني", "مايكروسوفت", "جوجل", "أمازون", "نايكي", "أديداس", "بوما", "أندر آرمور", "ستاربكس", "دانكن", "ماكدونالدز", "برجر كنج", "كنتاكي", "هارديز", "بيتزا هات", "دومينوز", "بيبسي", "كوكاكولا", "ريد بول", "تويوتا", "لكزس", "مرسيدس", "بي إم دبليو", "أودي", "تسلا", "هيونداي", "كيا", "فورد", "نيسان", "هوندا", "رولكس", "كاسيو", "شانيل", "ديور", "غوتشي", "لويس فيتون", "زارا", "إتش آند إم", "آيكيا", "نون", "نمشي", "علي بابا", "إيباي", "ديزني", "نتفليكس", "يوتيوب", "تيك توك", "سناب شات", "إنستغرام", "واتساب", "تويتر", "فيسبوك", "كانون", "نيكون", "باناسونيك", "إل جي", "توشيبا", "ديل", "إتش بي", "لينوفو", "أسوس", "إنتل", "إنفيديا", "ريزر", "لوجيتيك", "أوميغا", "كارتييه", "فيراري", "لامبورغيني", "بنتلي", "رولز رويس", "بورشه", "جيب", "لاند روفر", "شل", "أرامكو", "سابك", "إس تي سي", "موبايلي", "زين", "الراجحي", "البنك الأهلي", "طيران الإمارات", "الخطوط السعودية", "الخطوط القطرية", "نسكافيه", "كيت كات", "جالكسي", "نوتيلا", "ليز", "برينجلز", "أوريو"],

        const customId = Math.floor(1000 + Math.random() * 9000).toString();
        const peer = new Peer(customId, { config: { 'iceServers': [{ url: 'stun:stun.l.google.com:19302' }] } });
        
        let conn, s1 = 0, s2 = 0, timerInterval;

        peer.on('open', (id) => { document.getElementById('myIdDisplay').innerText = id; });

        function startAsDisplay() {
            document.getElementById('setupView').classList.add('hidden');
            document.getElementById('displayView').classList.remove('hidden');
            peer.on('connection', (c) => { conn = c; conn.on('data', handleData); });
        }

        function startAsAdmin() {
            const targetId = document.getElementById('joinIdInput').value;
            conn = peer.connect(targetId);
            conn.on('open', () => {
                document.getElementById('setupView').classList.add('hidden');
                document.getElementById('adminView').classList.remove('hidden');
            });
        }

        function handleData(d) {
            if (d.type === 'round') startTimer(d.img);
            if (d.type === 'score') { document.getElementById('ds1').innerText = d.s1; document.getElementById('ds2').innerText = d.s2; }
        }

        function sendNextRound() {
            const cat = document.getElementById('catSelect').value;
            const name = db[cat][Math.floor(Math.random() * db[cat].length)];
            document.getElementById('ansDisplay').innerText = "الإجابة: " + name;
            // استخدام Unsplash المصدر الأقوى والأسرع
            const img = `https://source.unsplash.com/featured/500x500/?${tags[cat]},${encodeURIComponent(name)}`;
            conn.send({ type: 'round', img: img });
        }

        function sendScore(t) { if(t===1) s1+=10; else s2+=10; conn.send({ type: 'score', s1, s2 }); }

        function startTimer(url) {
            const img = document.getElementById('pixelImg');
            img.src = url; 
            img.style.filter = "blur(80px)";
            let count = 60;
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                count--;
                document.getElementById('timerBox').innerText = count;
                img.style.filter = `blur(${(count / 60) * 80}px)`;
                if (count <= 0) { clearInterval(timerInterval); img.style.filter = "blur(0px)"; }
            }, 1000);
        }
    </script>
