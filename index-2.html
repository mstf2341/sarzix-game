<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحدي SARZIX | نسخة الدقيقة الذهبية</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --p: #38bdf8; --bg: #0f172a; --card: #1e293b; --accent: #fbbf24; --danger: #ef4444; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: white; margin: 0; text-align: center; overflow-x: hidden; }
        .hidden { display: none !important; }
        button { cursor: pointer; transition: 0.2s; border: none; font-weight: bold; border-radius: 12px; }
        button:active { transform: scale(0.95); }
        
        /* شاشة العرض */
        #displayView .header { display: flex; justify-content: space-around; align-items: center; background: var(--card); padding: 20px; font-size: 2.2rem; border-bottom: 5px solid var(--p); }
        #timerBox { font-size: 4rem; background: #000; padding: 10px 40px; border-radius: 20px; color: var(--accent); border: 3px solid var(--p); min-width: 120px; }
        #pixelImg { width: 450px; height: 450px; border-radius: 30px; margin-top: 20px; filter: blur(80px); object-fit: cover; border: 8px solid var(--card); transition: filter 1s ease-in-out; }
        .score-val { color: var(--accent); font-weight: bold; }
        
        #hintDisplay { background: rgba(251, 191, 36, 0.2); border: 2px dashed var(--accent); padding: 15px; border-radius: 15px; margin-top: 20px; display: inline-block; min-width: 300px; font-size: 1.8rem; color: var(--accent); visibility: hidden; animation: bounce 0.5s ease; }
        @keyframes bounce { 0% {transform: scale(0.8);} 50% {transform: scale(1.1);} 100% {transform: scale(1);} }

        /* لوحة المقدم */
        #adminView { padding: 20px; max-width: 500px; margin: auto; }
        .box { background: var(--card); padding: 20px; border-radius: 20px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.1); }
        select, input { width: 90%; padding: 15px; margin: 10px 0; border-radius: 10px; border: 1px solid var(--p); font-size: 1.1rem; background: #0f172a; color: white; }
        .btn-action { width: 100%; padding: 18px; margin-top: 10px; font-size: 1.2rem; }
        .btn-blue { background: var(--p); color: white; }
        .btn-green { background: #10b981; color: white; }
        .btn-purple { background: #8b5cf6; color: white; }
        .btn-yellow { background: var(--accent); color: #000; }
    </style>
</head>
<body>

    <div id="modeSelection" style="display: flex; flex-direction: column; gap: 20px; align-items: center; justify-content: center; height: 100vh;">
        <h1 style="font-size: 5rem; color: var(--p); margin: 0; text-shadow: 0 0 30px var(--p);">SARZIX</h1>
        <button class="btn-action btn-blue" style="width: 280px;" onclick="startMode('display')">شاشة العرض 📺</button>
        <button class="btn-action btn-green" style="width: 280px;" onclick="startMode('admin')">لوحة المقدم 📱</button>
    </div>

    <div id="displayView" class="hidden">
        <div class="header">
            <div><span id="dn1">فريق 1</span>: <span id="ds1" class="score-val">0</span></div>
            <div id="timerBox">60</div>
            <div><span id="dn2">فريق 2</span>: <span id="ds2" class="score-val">0</span></div>
        </div>
        <div id="qrInitial">
            <div id="qrcode" style="background:white; padding:20px; border-radius:20px; display:inline-block; margin-top:40px; border:5px solid var(--p);"></div>
            <p style="margin-top:15px; color:var(--p);">امسح الكود للتحكم بالجوال</p>
        </div>
        <div id="gameArea" class="hidden">
            <img id="pixelImg" src="" alt="Challenge"><br>
            <div id="hintDisplay">💡 تلميح: <span id="hintText">...</span></div>
            <h2 id="dMsg" style="font-size: 2.2rem; margin-top: 10px; color: var(--p);">من هذا؟ 🤔</h2>
        </div>
    </div>

    <div id="adminView" class="hidden">
        <div class="box">
            <select id="catSelect">
                <option value="youtubers">👤 يوتيوبرز عرب</option>
                <option value="players">⚽ لاعبين</option>
                <option value="clubs">🛡️ أندية</option>
                <option value="brands">🏢 ماركات</option>
                <option value="food">🍕 أكلات</option>
            </select>
            <input type="text" id="in1" placeholder="اسم الفريق 1">
            <input type="text" id="in2" placeholder="اسم الفريق 2">
            <button class="btn-action btn-blue" onclick="syncAll()">بدء اللعبة ✅</button>
        </div>
        <div class="box">
            <h2 id="currentAns" style="color: var(--accent); margin-bottom:5px;">الإجابة: ---</h2>
            <button class="btn-action btn-purple" onclick="nextRound()" style="font-size: 1.4rem;">جولة جديدة (دقيقة) 🚀</button>
            <hr style="margin: 15px 0; border: 0.5px solid #444;">
            <input type="text" id="hintInput" placeholder="اكتب التلميح هنا...">
            <button class="btn-action btn-yellow" onclick="sendHint()">إرسال تلميح للشاشة 💡</button>
        </div>
        <div class="box" style="display: flex; gap: 10px;">
            <button class="btn-action btn-green" onclick="addScore(1)">+ فريق 1</button>
            <button class="btn-action btn-green" onclick="addScore(2)">+ فريق 2</button>
        </div>
    </div>

            brands: ["أبل", "سامسونج", "هواوي", "سوني", "مايكروسوفت", "جوجل", "أمازون", "نايكي", "أديداس", "بوما", "أندر آرمور", "ستاربكس", "دانكن", "ماكدونالدز", "برجر كنج", "كنتاكي", "هارديز", "بيتزا هات", "دومينوز", "بيبسي", "كوكاكولا", "ريد بول", "تويوتا", "لكزس", "مرسيدس", "بي إم دبليو", "أودي", "تسلا", "هيونداي", "كيا", "فورد", "نيسان", "هوندا", "رولكس", "كاسيو", "شانيل", "ديور", "غوتشي", "لويس فيتون", "زارا", "إتش آند إم", "آيكيا", "نون", "نمشي", "علي بابا", "إيباي", "ديزني", "نتفليكس", "يوتيوب", "تيك توك", "سناب شات", "إنستغرام", "واتساب", "تويتر", "فيسبوك", "كانون", "نيكون", "باناسونيك", "إل جي", "توشيبا", "ديل", "إتش بي", "لينوفو", "أسوس", "إنتل", "إنفيديا", "ريزر", "لوجيتيك", "أوميغا", "كارتييه", "فيراري", "لامبورغيني", "بنتلي", "رولز رويس", "بورشه", "جيب", "لاند روفر", "شل", "أرامكو", "سابك", "إس تي سي", "موبايلي", "زين", "الراجحي", "البنك الأهلي", "طيران الإمارات", "الخطوط السعودية", "الخطوط القطرية", "نسكافيه", "كيت كات", "جالكسي", "نوتيلا", "ليز", "برينجلز", "أوريو"],

        let currentPool = JSON.parse(JSON.stringify(originalData));
        let s1 = 0, s2 = 0;
        let timerInterval;

        function startMode(mode) {
            document.getElementById('modeSelection').classList.add('hidden');
            if (mode === 'display') {
                document.getElementById('displayView').classList.remove('hidden');
                new QRCode(document.getElementById("qrcode"), { text: window.location.href, width: 200, height: 200 });
                initSync();
            } else {
                document.getElementById('adminView').classList.remove('hidden');
            }
        }

        function syncAll() {
            localStorage.setItem('sarzix_sync', JSON.stringify({
                type: 'init',
                n1: document.getElementById('in1').value || "فريق 1",
                n2: document.getElementById('in2').value || "فريق 2",
                s1: 0, s2: 0
            }));
            alert("تم التوصيل بنجاح!");
        }

        function nextRound() {
            const catKey = document.getElementById('catSelect').value;
            const list = currentPool[catKey];
            if (list.length === 0) { alert("انتهت الأسماء في هذه الفئة!"); return; }

            const index = Math.floor(Math.random() * list.length);
            const name = list.splice(index, 1)[0];

            document.getElementById('currentAns').innerText = "الإجابة: " + name;
            document.getElementById('hintInput').value = ""; 

            const imgUrl = `https://loremflickr.com/600/600/${encodeURIComponent(name)}`;
            localStorage.setItem('sarzix_sync', JSON.stringify({ type: 'round', img: imgUrl, nonce: Math.random() }));
        }

        function sendHint() {
            const hint = document.getElementById('hintInput').value;
            localStorage.setItem('sarzix_sync', JSON.stringify({ type: 'hint', text: hint, nonce: Math.random() }));
        }

        function addScore(t) {
            if (t === 1) s1 += 10; else s2 += 10;
            localStorage.setItem('sarzix_sync', JSON.stringify({ type: 'score', s1, s2 }));
        }

        function initSync() {
            window.addEventListener('storage', (e) => {
                if (e.key === 'sarzix_sync') {
                    const d = JSON.parse(e.newValue);
                    if (d.type === 'init') {
                        document.getElementById('qrInitial').classList.add('hidden');
                        document.getElementById('gameArea').classList.remove('hidden');
                        document.getElementById('dn1').innerText = d.n1; document.getElementById('dn2').innerText = d.n2;
                        document.getElementById('ds1').innerText = d.s1; document.getElementById('ds2').innerText = d.s2;
                    }
                    if (d.type === 'score') {
                        document.getElementById('ds1').innerText = d.s1; document.getElementById('ds2').innerText = d.s2;
                    }
                    if (d.type === 'round') {
                        document.getElementById('hintDisplay').style.visibility = "hidden";
                        startTimer(d.img);
                    }
                    if (d.type === 'hint') {
                        document.getElementById('hintText').innerText = d.text;
                        document.getElementById('hintDisplay').style.visibility = "visible";
                    }
                }
            });
        }

        function startTimer(url) {
            const img = document.getElementById('pixelImg');
            const timer = document.getElementById('timerBox');
            img.src = url; 
            img.style.filter = "blur(80px)";
            
            let count = 60;
            timer.innerText = count;
            timer.style.color = "var(--accent)";
            
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                count--;
                timer.innerText = count;

                // تخفيف التغبيش التدريجي كل 10 ثوانٍ
                if (count >= 50) img.style.filter = "blur(80px)";
                else if (count >= 40) img.style.filter = "blur(60px)";
                else if (count >= 30) img.style.filter = "blur(40px)";
                else if (count >= 20) img.style.filter = "blur(20px)";
                else if (count >= 10) img.style.filter = "blur(10px)";
                else img.style.filter = "blur(5px)";

                if (count <= 10) timer.style.color = "var(--danger)";

                if (count <= 0) {
                    clearInterval(timerInterval);
                    img.style.filter = "blur(0px)";
                    document.getElementById('dMsg').innerText = "انتهى الوقت! ❌";
                } else {
                    document.getElementById('dMsg').innerText = "من هذا؟ 🤔";
                }
            }, 1000);
        }
    </script>
</body>
</html>
